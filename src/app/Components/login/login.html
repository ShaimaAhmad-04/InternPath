<div class="login-page">

  <!-- Navbar -->
 

  <!-- Login Card -->
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo Icon -->
      <div class="card-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>

      <h1 class="card-title">Welcome Back</h1>
      <p class="card-subtitle">Enter your credentials to access your account</p>

      <!-- Error Message -->
      <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
          <input
            type="email"
            placeholder="your.email@psut.edu.jo"
            [(ngModel)]="email"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            type="password"
            placeholder="Enter your password"
            [(ngModel)]="password"
          />
        </div>
      </div>

      <!-- Login Button -->
      <button class="btn-login" (click)="onLogin()">Login</button>

      <!-- Divider -->
      <div class="divider">
        <span>Demo Accounts</span>
      </div>

      <!-- Demo Buttons -->
      <button class="btn-demo" (click)="loginAsStudent()">Login as Student</button>
      <button class="btn-demo" (click)="loginAsRecruiter()">Login as Recruiter</button>
      <button class="btn-demo" (click)="loginAsAdmin()">Login as Admin</button>

      <!-- Sign up -->
      <p class="signup-text">
        Don't have an account?
        <a class="signup-link" (click)="goToSignup()">Sign up</a>
      </p>

    </div>
  </div>

</div>
