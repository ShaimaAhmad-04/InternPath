<div class="page">
  <div class="hero">
    <h1>Explore Internship Opportunities</h1>
    <p>Find the perfect internship that matches your skills and goals</p>
  </div>

  <div class="filters">
    <div class="search-wrapper">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg"
        width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        placeholder="Search internships, companies..."
        [(ngModel)]="searchQuery"
        (input)="onSearch()"
      />
    </div>

    <select [(ngModel)]="selectedLocation" (change)="onLocationChange()">
      <option *ngFor="let loc of locations" [value]="loc.value">{{ loc.label }}</option>
    </select>

    <select [(ngModel)]="selectedType" (change)="onTypeChange()">
      <option *ngFor="let t of types">{{ t }}</option>
    </select>
  </div>

  <ng-container *ngIf="internships$ | async as list">
    <p class="count">Showing <strong>{{ list.length }}</strong> internships</p>
    <div class="grid">
      <app-internship-card
        *ngFor="let internship of list"
        [internship]="internship">
      </app-internship-card>
    </div>
  </ng-container>
</div>
